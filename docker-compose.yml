
services:
    db:
        image: pgvector/pgvector:pg17
        container_name: rag_db
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: admin
            POSTGRES_DB: rag_db
        ports:
        - "5432:5432"
        volumes:
            - pgdata:/var/lib/postgresql/data

    ollama:
        image: ollama/ollama:latest
        container_name: rag_ollama
        ports:
            - "11434:11434"
        volumes:
            - ollama_data:/root/.ollama
        restart: unless-stopped
        healthcheck:
            test: ["CMD", "ollama", "list"]
            interval: 30s
            timeout: 10s
            retries: 5
            start_period: 5s

    ollama-pull:
        image: ollama/ollama:latest
        container_name: rag_ollama_pull
        environment:
            - OLLAMA_HOST=http://ollama:11434
        depends_on:
        - ollama
        volumes:
        - ollama_data:/root/.ollama
        entrypoint: >
            /bin/sh -c "
            sleep 10 &&
            ollama pull llama3.2:3b
            "

    generation_service:
        build:
            context: ./generation_service
            dockerfile: Dockerfile
        container_name: generation_service
        env_file:
            - .env
        ports:
            - "8002:8002"
        depends_on:
            - ollama
    
    embedding_api:
        build:
            context: ./embedding_service
        container_name: embedding_api
        env_file:
            - .env
        ports:
            - "8001:8001"

    api:
        build:
            context: ./rag_api
        container_name: rag_api
        depends_on:
            - db
            - embedding_api
            - ollama
            - generation_service
        env_file:
            - .env
        ports:
            - "8000:8000"
        volumes:
            - .:/app

volumes:
    pgdata:
    ollama_data:
